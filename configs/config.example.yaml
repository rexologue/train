# Production SFT/DPO training contour example.
# The run always executes the full pipeline: model source resolution,
# preprocessing cache, routed dataloaders, optional DPO reference-logprob cache,
# training, eval, checkpointing, MLflow tracking, and candidate registration.

project:
  # MLflow experiment name and default destination registry model name.
  name: estadel-dialog-tuning
  # Optional MLflow run name.
  run_name: qwen35-a3b-lora-sft-dpo-v1
  seed: 42
  # Single output root for pretokenized cache, ref-logprob cache, checkpoints,
  # eval rows, and run-local artifacts.
  output_dir: runs/estadel-dialog-tuning/qwen35-a3b-lora-sft-dpo-v1

model:
  # Source model is resolved from modelctl/MLflow registry by alias.
  name: estadel-llm
  alias: champion
  # Local model payload cache. Main process verifies or pulls it through modelctl.
  cache_dir: artifacts/model_cache/estadel-llm/champion

  checks:
    # Kept for config compatibility. Current resolution uses modelctl verify
    # before pull and records the verified payload hash in the local sidecar.
    verify_local_hash: true
    verify_remote_ref: false
    require_registry_metadata: true

  precision: bf16
  trust_remote_code: true
  attn_implementation: flash_attention_2
  experts_implementation: eager
  gradient_checkpointing: false
  freeze_router: true
  freeze_embeddings: true
  freeze_lm_head: true

tokenizer:
  # Tokenizer and official chat template are loaded from model.cache_dir.
  use_fast: true
  add_special_tokens: false
  padding_side: right

lora:
  r: 32
  alpha: 64
  dropout: 0.05
  bias: none
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
  modules_to_save: []

preprocessing:
  raw:
    train_path: data/train.parquet
    valid_path: data/valid.parquet
    test_path: data/test.parquet
    test_required: false

  sequence:
    max_seq_len: 8192
    truncation: false
    packing: false

  rendering:
    use_system: true
    reject_raw_special_markers: true

  reasoning:
    enable_thinking: false

  masking:
    ignore_index: -100
    require_positive_supervised_tokens: true

    policies:
      sft_target:
        min_guaranteed_assistant_chars: 80
        loss_on_short_assistant_reply_prob: 0.3
        short_response_sampling_seed: 42

  quality:
    max_rejected_fraction: 0.05
    min_processed_rows_per_loss_kind:
      sft_target: 1
      sft_tool: 1
      dpo_target: 1
    min_supervised_tokens: 1

loss_routing:
  # Route frequency is determined by dataset composition. No sampler weights.
  # `dpo_target` is a supported active route; remove it only when the dataset
  # and run are intentionally SFT-only.
  routes:
    sft_target:
      type: sft_ce
    sft_tool:
      type: sft_ce
    dpo_target:
      type: dpo

  dpo:
    beta: 0.1
    reference:
      # The reference policy is the source base model before LoRA is attached.
      # It is computed as a separate pre-training cache stage after dataloaders.
      # Store reference logprobs in output_dir/ref_logprobs/<signature>.
      cache_enabled: true
      # Force recomputation even when a matching cache exists.
      cache_refresh: false
      # Fail if DPO rows cannot get cached reference logprobs.
      cache_required: false

training:
  num_epochs: 3
  per_device_train_batch_size: 1
  drop_last: false
  gradient_accumulation_steps: 16
  learning_rate: 0.00005
  adamw_betas:
    - 0.9
    - 0.999
  weight_decay: 0.0
  warmup_ratio: 0.03
  lr_scheduler_type: cosine
  max_grad_norm: 1.0

progress:
  enabled: true

distributed:
  fsdp:
    sharding_strategy: full_shard
    mixed_precision: bf16
    cpu_offload: false
    activation_checkpointing: true
    state_dict_type: sharded_state_dict
    use_orig_params: true
    limit_all_gathers: true
    auto_wrap_policy: transformer_based_wrap
    transformer_cls_names_to_wrap:
      - Qwen3_5MoeDecoderLayer
    cpu_ram_efficient_loading: true
    sync_module_states: true

eval:
  every_train_steps: 25
  standard:
    max_batches: 50
  bfcl:
    enabled: false
    run_every_n_validations: 4
    include_multi_turn: true
    categories: null
    limit: 100
    generation:
      max_new_tokens: 256
      temperature: 0.0
      top_p: 1.0
      do_sample: false

checkpointing:
  save_every_n_validations: 1
  save_total_limit: 3
  resume:
    enabled: true
    strict_config: true
    strict_dataset_hash: true
    strict_template_hash: true
    strict_model_source_hash: true

mlflow:
  tracking_uri: http://localhost:5000
  resume_run_id: null
  async_logging:
    enabled: true
    queue_max_items: 1024
    flush_timeout_seconds: 300
    fail_on_worker_error: true
  log_rendered_samples: true

registry:
  # Training registers candidate aliases only. Production promotion is separate.
  register_every_n_checkpoints: 5
  selection:
    # Ordinary metrics: eval/sft/loss, eval/sft/ppl, eval/dpo/loss,
    # eval/dpo/accuracy, eval/dpo/reward_margin, plus legacy aggregate
    # eval/loss for dashboards only.
    # BFCL metrics: eval/bfcl/accuracy, eval/bfcl/total, eval/bfcl/passed,
    # eval/bfcl/failed, eval/bfcl/<category>/accuracy,
    # eval/bfcl/<category>/total.
    metric: eval/sft/loss
    mode: min
