# Единственный production-конфиг. Запуск всегда выполняет полный training contour.

project:
  # Одно имя для MLflow experiment и destination model в registry.
  name: estadel-dialog-sft
  # Имя MLflow run. null разрешен.
  run_name: qwen35-a3b-lora-v1
  seed: 42
  # Единственный output root. Pretokenized cache, checkpoints и eval rows
  # автоматически пишутся в подпапки этого каталога.
  output_dir: runs/estadel-dialog-sft/qwen35-a3b-lora-v1

model:
  # Source model всегда загружается из registry по alias.
  name: estadel-llm
  alias: champion
  # Локальный cache destination для modelctl pull.
  cache_dir: artifacts/model_cache/estadel-llm/champion
  checks:
    verify_local_hash: true
    verify_remote_ref: false
    require_registry_metadata: true
  precision: bf16
  use_fp8_base: false
  trust_remote_code: true
  attn_implementation: flash_attention_2
  gradient_checkpointing: true
  freeze_router: true
  freeze_embeddings: true
  freeze_lm_head: true

tokenizer:
  # Tokenizer и official chat template всегда берутся из model.cache_dir.
  use_fast: true
  add_special_tokens: false
  padding_side: right

lora:
  r: 32
  alpha: 64
  dropout: 0.05
  bias: none
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
  modules_to_save: []

preprocessing:
  raw:
    train_path: data/train.parquet
    valid_path: data/valid.parquet
    test_path: data/test.parquet
    test_required: false
  sequence:
    max_seq_len: 8192
    truncation: false
    packing: false
  rendering:
    reject_raw_special_markers: true
  reasoning:
    enable_thinking: false
  masking:
    ignore_index: -100
    require_positive_supervised_tokens: true
    policies:
      sft_target:
        min_guaranteed_assistant_chars: 80
        loss_on_short_assistant_reply_prob: 0.3
        short_response_sampling_seed: 42
      sft_tool: {}

loss_routing:
  # Частота routes всегда определяется самим датасетом. Никаких sampler weights.
  routes:
    sft_target:
      type: sft_ce
    sft_tool:
      type: sft_ce

training:
  # Полное число проходов по train DataLoader.
  num_epochs: 3
  per_device_train_batch_size: 1
  drop_last: false
  gradient_accumulation_steps: 16
  learning_rate: 0.00005
  adamw_betas:
    - 0.9
    - 0.999
  weight_decay: 0.0
  warmup_ratio: 0.03
  lr_scheduler_type: cosine
  max_grad_norm: 1.0

progress:
  enabled: true

distributed:
  fsdp:
    sharding_strategy: full_shard
    mixed_precision: bf16
    cpu_offload: false
    activation_checkpointing: true
    state_dict_type: sharded_state_dict
    use_orig_params: true
    limit_all_gathers: true
    auto_wrap_policy: transformer_based_wrap
    transformer_cls_names_to_wrap:
      - Qwen3_5MoeDecoderLayer
    cpu_ram_efficient_loading: true
    sync_module_states: true

eval:
  every_train_steps: 25
  standard:
    max_batches: 50
  bfcl:
    # false полностью отключает BFCL. Dataset всегда bundled в src/eval/ru_bfcl/data.
    enabled: true
    run_every_n_validations: 1
    include_multi_turn: true
    categories: null
    limit: null
    generation:
      max_new_tokens: 1024
      temperature: 0.0
      top_p: 1.0
      do_sample: false

checkpointing:
  save_every_n_validations: 1
  save_total_limit: 3
  resume:
    enabled: true
    strict_config: true
    strict_dataset_hash: true
    strict_template_hash: true

mlflow:
  # MLflow всегда включен. Experiment/run names берутся из project.
  tracking_uri: http://localhost:5000
  resume_run_id: null
  async_logging:
    enabled: true
    queue_max_items: 1024
    flush_timeout_seconds: 300
    fail_on_worker_error: true
  log_rendered_samples: true

registry:
  # Destination model = project.name. Aliases = candidate-NNNNNN и candidate-latest.
  register_every_n_checkpoints: 5
  selection:
    # Ordinary: eval/loss, eval/ppl, eval/batches, eval/tokens,
    # eval/supervised_tokens.
    # BFCL: eval/bfcl/accuracy, eval/bfcl/total, eval/bfcl/passed,
    # eval/bfcl/failed, eval/bfcl/<category>/accuracy,
    # eval/bfcl/<category>/total.
    # Для отключенного BFCL выбирай eval/loss или eval/ppl.
    metric: eval/loss
    mode: min
